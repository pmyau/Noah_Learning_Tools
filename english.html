<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>English Flashcards (Pexels HD Version)</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #eef2f7;
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #control-panel {
            background-color: #ffffff;
            padding: 10px 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 10;
        }
        .home-btn {
            font-size: 1rem;
            padding: 8px 12px;
            background-color: #748ffc;
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            text-decoration: none;
        }
        select {
            font-size: 1rem;
            padding: 8px 12px;
            border: 3px solid #cbd5e1;
            border-radius: 12px;
            background-color: white;
            font-weight: bold;
            color: #1e293b;
        }
        
        /* 左右雙卡容器 */
        #flashcard-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            gap: 24px;
            width: 100%;
            max-width: 950px;
            margin: 0 auto;
        }

        /* 雙卡通用基礎樣式 */
        .game-card {
            background: white;
            flex: 1;
            height: 60%;
            max-height: 450px;
            border-radius: 32px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden; /* 裁剪超出圓角的圖片 */
            animation: cardPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.2) forwards;
        }

        /* 左邊相片卡：藍色邊框，貼緊邊緣 */
        #image-card {
            border: 6px solid #339af0;
            padding: 0; 
            background-color: #f1f3f5;
        }

        /* 右邊文字卡：深藍色邊框 */
        #text-card {
            border: 6px solid #228be6;
        }

        /* Pexels 真實圖片樣式 */
        #real-pic {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 22px;
            transition: opacity 0.3s ease;
            opacity: 0; /* 下載完才顯示 */
        }

        /* 文字大小與樣式 */
        #word-text {
            font-size: 4rem;
            font-weight: 900;
            color: #1a252f;
            text-transform: capitalize;
            text-align: center;
            width: 100%;
            word-break: break-all;
            padding: 0 10px;
        }

        /* 發聲按鈕 */
        #speak-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background-color: #3b82f6;
            border: none;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            font-size: 1.5rem;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 0 #1d4ed8;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #speak-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #1d4ed8;
        }

        /* 進階自訂輸入區 */
        #custom-panel {
            background-color: #fff;
            padding: 12px 15px;
            border-top: 2px dashed #dbe4ff;
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
            z-index: 10;
        }
        .custom-title {
            font-size: 0.9rem;
            font-weight: bold;
            color: #3b82f6;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .input-row {
            display: flex;
            width: 100%;
            max-width: 360px;
            gap: 8px;
        }
        input[type="text"] {
            flex: 1;
            font-size: 1.1rem;
            padding: 10px 14px;
            border: 3px solid #dbe4ff;
            border-radius: 16px;
            outline: none;
            color: #1a252f;
            font-weight: bold;
            -webkit-user-select: text;
            user-select: text;
        }
        input[type="text"]:focus {
            border-color: #3b82f6;
        }
        .magic-btn {
            font-size: 1.1rem;
            padding: 10px 16px;
            background-color: #3b82f6;
            color: white;
            border: none;
            border-radius: 16px;
            font-weight: bold;
            box-shadow: 0 4px 0 #1d4ed8;
        }
        .magic-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #1d4ed8;
        }
        #nav-panel {
            padding: 10px;
            display: flex;
            justify-content: center;
            gap: 40px;
        }
        .nav-btn {
            font-size: 1.1rem;
            padding: 10px 24px;
            color: white;
            border: none;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 0 rgba(0,0,0,0.15);
        }
        #prev-btn { background-color: #adb5bd; box-shadow: 0 5px 0 #868e96; }
        #prev-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #868e96; }
        #next-btn { background-color: #4dadf7; box-shadow: 0 5px 0 #339af0; }
        #next-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #339af0; }

        @keyframes cardPop {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* 窄螢幕 RWD 自適應 */
        @media (max-width: 600px) {
            #flashcard-area {
                flex-direction: column;
                gap: 15px;
            }
            .game-card {
                width: 100%;
                height: 40%;
                padding: 15px;
            }
            #image-card {
                padding: 0;
            }
            #word-text {
                font-size: 3rem;
            }
        }
    </style>
</head>
<body>

    <div id="control-panel">
        <a href="index.html" class="home-btn">🏠 Home</a>
        <select id="theme-select" onchange="changeTheme()">
            <option value="animals">🦁 Animals</option>
            <option value="items">🧸 Items</option>
            <option value="jobs">👨‍🚀 Jobs</option>
        </select>
    </div>

    <div id="flashcard-area">
        <!-- 左卡：純真實相片 -->
        <div id="image-card" class="game-card">
            <img id="real-pic" src="" alt="Real Photo">
        </div>

        <!-- 右卡：純文字 -->
        <div id="text-card" class="game-card">
            <div id="word-text">Lion</div>
            <button id="speak-btn">🔊</button>
        </div>
    </div>

    <div id="nav-panel">
        <button id="prev-btn" class="nav-btn" onclick="prevCard()">◀ Prev</button>
        <button id="next-btn" class="nav-btn" onclick="nextCard()">Next ▶</button>
    </div>

    <!-- 進階自訂生成區 -->
    <div id="custom-panel">
        <div class="custom-title">🪄 Magic Card Maker (Siri Voice typing friendly):</div>
        <div class="input-row">
            <input type="text" id="custom-input" placeholder="e.g. apple, plane, car, sun..." maxlength="15">
            <button class="magic-btn" onclick="generateCustomCard()">Go!</button>
        </div>
    </div>

    <script>
        // Pexels API 金鑰
        const PEXELS_API_KEY = "pzMoBCE8OR6nBcm0MfRs5QySojQ5Q6foGmduaVWvExJp5MLS0JhCqMmB";

        const database = {
            animals: [
                { word: "Lion", query: "lion" }, { word: "Elephant", query: "elephant" }, { word: "Giraffe", query: "giraffe" },
                { word: "Dog", query: "puppy" }, { word: "Cat", query: "kitten" }, { word: "Rabbit", query: "rabbit" },
                { word: "Panda", query: "panda" }, { word: "Monkey", query: "monkey" }
            ],
            items: [
                { word: "Toothbrush", query: "toothbrush" }, { word: "Towel", query: "towel" }, { word: "Cup", query: "cup" },
                { word: "Umbrella", query: "umbrella" }, { word: "Backpack", query: "backpack" }, { word: "Scissors", query: "scissors" },
                { word: "Watch", query: "wristwatch" }, { word: "Key", query: "key" }
            ],
            jobs: [
                { word: "Doctor", query: "doctor" }, { word: "Firefighter", query: "firefighter" }, { word: "Police officer", query: "police officer" },
                { word: "Chef", query: "chef" }, { word: "Teacher", query: "teacher" }, { word: "Astronaut", query: "astronaut" },
                { word: "Painter", query: "painter" }, { word: "Farmer", query: "farmer" }
            ]
        };

        let currentTheme = 'animals';
        let currentList = [];
        let currentIndex = 0;

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function changeTheme(shouldSpeak = true) {
            currentTheme = document.getElementById('theme-select').value;
            currentList = shuffle([...database[currentTheme]]);
            currentIndex = 0;
            updateCard(shouldSpeak);
        }

        // 非同步向 Pexels 獲取圖片
        async function fetchPexelsImage(query) {
            try {
                if (!PEXELS_API_KEY) throw new Error('API Key missing');

                const response = await fetch(`https://api.pexels.com/v1/search?query=${encodeURIComponent(query)}&per_page=1&orientation=square`, {
                    headers: {
                        Authorization: PEXELS_API_KEY
                    }
                });
                
                if (!response.ok) throw new Error('Pexels API Request Failed');
                
                const data = await response.json();
                if (data.photos && data.photos.length > 0) {
                    return data.photos[0].src.medium;
                } else {
                    const backupResponse = await fetch(`https://api.pexels.com/v1/search?query=${encodeURIComponent(query)}&per_page=1`, {
                        headers: { Authorization: PEXELS_API_KEY }
                    });
                    const backupData = await backupResponse.json();
                    if (backupData.photos && backupData.photos.length > 0) {
                        return backupData.photos[0].src.large;
                    }
                    throw new Error('No photos found');
                }
            } catch (error) {
                console.warn('Pexels failed, switching to backup source:', error);
                return `https://loremflickr.com/400/400/${encodeURIComponent(query)}/all`;
            }
        }

        // 更新卡片內容
        async function updateCard(shouldSpeak = true) {
            try {
                if (currentList.length === 0) return;
                const item = currentList[currentIndex];
                const imgCard = document.getElementById('image-card');
                const txtCard = document.getElementById('text-card');
                const realPic = document.getElementById('real-pic');
                
                imgCard.style.animation = 'none';
                txtCard.style.animation = 'none';
                imgCard.offsetHeight; 
                txtCard.offsetHeight; 
                imgCard.style.animation = 'cardPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.2) forwards';
                txtCard.style.animation = 'cardPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.2) forwards';

                realPic.style.opacity = '0';

                const imageUrl = await fetchPexelsImage(item.query);
                realPic.src = imageUrl;

                realPic.onload = function() {
                    realPic.style.opacity = '1';
                };

                document.getElementById('word-text').innerText = item.word;
                
                if (shouldSpeak) {
                    speakWord();
                }
            } catch (e) {
                console.error("Error updating card: ", e);
            }
        }

        // 自訂生成英文實物字卡
        async function generateCustomCard() {
            try {
                const inputField = document.getElementById('custom-input');
                const rawText = inputField.value.trim();
                if (!rawText) return;

                const imgCard = document.getElementById('image-card');
                const txtCard = document.getElementById('text-card');
                const realPic = document.getElementById('real-pic');
                
                imgCard.style.animation = 'none';
                txtCard.style.animation = 'none';
                imgCard.offsetHeight;
                txtCard.offsetHeight;
                imgCard.style.animation = 'cardPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.2) forwards';
                txtCard.style.animation = 'cardPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.2) forwards';

                document.getElementById('word-text').innerText = rawText;
                realPic.style.opacity = '0';
                
                const imageUrl = await fetchPexelsImage(rawText);
                realPic.src = imageUrl;
                realPic.onload = function() {
                    realPic.style.opacity = '1';
                };

                currentList.splice(currentIndex + 1, 0, { word: rawText, query: rawText });
                currentIndex++;

                inputField.value = "";
                inputField.blur();
                
                speakWord();
            } catch (e) {
                console.error("Error generating custom card: ", e);
            }
        }

        function nextCard() {
            if (currentIndex < currentList.length - 1) {
                currentIndex++;
                updateCard(true);
            } else {
                currentList = shuffle([...database[currentTheme]]);
                currentIndex = 0;
                updateCard(true);
            }
        }

        function prevCard() {
            if (currentIndex > 0) {
                currentIndex--;
                updateCard(true);
            }
        }

        function speakWord() {
            try {
                const text = document.getElementById('word-text').innerText;
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                const voices = window.speechSynthesis.getVoices();
                const englishVoice = voices.find(v => v.lang.includes('US') || v.lang.includes('en-US') || v.lang.startsWith('en'));
                if (englishVoice) utterance.voice = englishVoice;
                utterance.rate = 0.8;
                utterance.pitch = 1.1;
                window.speechSynthesis.speak(utterance);
            } catch (e) {
                console.error("Speech synthesis error: ", e);
            }
        }

        document.getElementById('speak-btn').addEventListener('click', speakWord);
        document.getElementById('speak-btn').addEventListener('touchstart', (e) => {
            e.preventDefault();
            speakWord();
        });

        document.getElementById('custom-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') generateCustomCard();
        });

        if (typeof speechSynthesis !== 'undefined' && speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = () => {
                window.speechSynthesis.getVoices();
            };
        }

        window.onload = () => {
            changeTheme(false); // 第一頁進去不自動發聲
        };
    </script>
</body>
</html>
