<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Noah樂學堂</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #fef9e7 0%, #f0f4f8 100%);
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        h1 {
            font-size: 2.8rem;
            color: #2c3e50;
            margin-bottom: 40px;
            text-shadow: 2px 2px 0px #fff;
            text-align: center;
        }
        .menu-container {
            display: flex;
            flex-direction: column;
            gap: 25px;
            width: 100%;
            max-width: 400px;
        }
        .menu-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            font-size: 1.8rem;
            font-weight: bold;
            color: white;
            padding: 20px;
            border-radius: 24px;
            text-decoration: none;
            box-shadow: 0 8px 0px rgba(0,0,0,0.1);
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .menu-btn:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0px rgba(0,0,0,0.1);
        }
        .btn-chinese { background-color: #ff6b6b; box-shadow: 0 8px 0px #dd5252; }
        .btn-english { background-color: #4dadf7; box-shadow: 0 8px 0px #339af0; }
        .btn-math { background-color: #51cf66; box-shadow: 0 8px 0px #37b24d; }
        
        .footer {
            margin-top: 50px;
            font-size: 0.9rem;
            color: #7f8c8d;
        }
    </style>
</head>
<body>

    <h1>🎈 幼兒樂學堂 🎈</h1>

    <div class="menu-container">
        <a href="chinese.html" class="menu-btn btn-chinese">
            <span>🏮</span> 中文
        </a>
        <a href="english.html" class="menu-btn btn-english">
            <span>🔤</span> English
        </a>
        <a href="math.html" class="menu-btn btn-math">
            <span>🔢</span> 數學
        </a>
    </div>

    <div class="footer">點選你想玩的遊戲吧！</div>

</body>
</html>
